<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="LinkReaper — كاشف الروابط المشبوهة | URL Safety Checker | Détecteur de liens dangereux">
<meta name="theme-color" content="#060608">
<title>LinkReaper — URL Safety Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Tajawal:wght@300;400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════ VARIABLES ═══════════════ */
:root{
  --blood:#9B1B1B;--neon:#FF2244;--dark:#060608;--panel:#0d0d12;
  --border:rgba(180,20,40,0.35);--green:#00FF88;--yellow:#FFB300;
  --text:#E0D5D5;--dim:#6B5B5B;--dim2:#9B8B8B;
  --shadow-red:0 0 20px rgba(255,34,68,0.4);
  --shadow-green:0 0 20px rgba(0,255,136,0.4);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  background:var(--dark);color:var(--text);
  font-family:'Tajawal',sans-serif;
  overflow-x:hidden;min-height:100vh;
}

/* ═══════════════ BACKGROUND ═══════════════ */
.bg-canvas{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 55% at 50% -5%,rgba(110,0,18,0.45),transparent 60%),
    radial-gradient(ellipse 35% 35% at 95% 95%,rgba(60,0,10,0.3),transparent 60%),
    var(--dark);
}
.bg-scanlines{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);
}
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(140,0,20,0.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(140,0,20,0.05) 1px,transparent 1px);
  background-size:50px 50px;
  animation:gridScroll 20s linear infinite;
}
@keyframes gridScroll{from{background-position:0 0;}to{background-position:0 50px;}}

/* Particles */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;}
.ptcl{
  position:absolute;border-radius:50%;
  background:var(--neon);animation:ptclFloat linear infinite;opacity:0;
}
@keyframes ptclFloat{
  0%{transform:translateY(100vh) translateX(0);opacity:0;}
  10%{opacity:.4;}90%{opacity:.15;}
  100%{transform:translateY(-5vh) translateX(15px);opacity:0;}
}

/* ═══════════════ LANG BAR ═══════════════ */
#langBar{
  position:fixed;top:0;left:0;right:0;z-index:300;
  background:rgba(6,6,8,0.96);
  border-bottom:1px solid var(--border);
  padding:.45rem .8rem;
  display:flex;align-items:center;gap:.35rem;
  overflow-x:auto;scrollbar-width:none;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
#langBar::-webkit-scrollbar{display:none;}
.lbtn{
  flex-shrink:0;padding:.28rem .65rem;
  background:transparent;border:1px solid rgba(155,27,27,0.3);
  border-radius:5px;color:var(--dim);
  font-family:'Tajawal',sans-serif;font-size:.74rem;
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.lbtn:hover{border-color:var(--neon);color:var(--text);}
.lbtn.on{background:rgba(255,34,68,0.14);border-color:var(--neon);color:var(--neon);}
.lsep{width:1px;height:16px;background:var(--border);flex-shrink:0;}

/* ═══════════════ APP SHELL ═══════════════ */
.app{
  position:relative;z-index:1;
  max-width:660px;margin:0 auto;
  padding:4.8rem 1.1rem 4rem;
  min-height:100vh;
}

/* ═══════════════ HEADER ═══════════════ */
.header{text-align:center;padding:2rem 0 1.4rem;}
.logo-ring{
  width:84px;height:84px;border-radius:50%;
  border:2px solid var(--blood);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto .8rem;position:relative;
  animation:ringPulse 2.5s ease-in-out infinite;
  background:radial-gradient(circle,rgba(100,0,15,0.3),transparent 70%);
}
.logo-ring::before{
  content:'';position:absolute;inset:-6px;
  border-radius:50%;border:1px solid rgba(255,34,68,0.12);
  animation:ringPulse 2.5s ease-in-out infinite reverse;
}
@keyframes ringPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,34,68,0.22);}
  50%{box-shadow:0 0 26px 6px rgba(255,34,68,0.1);}
}
.logo-skull{font-size:2.5rem;filter:drop-shadow(0 0 8px rgba(255,34,68,0.55));animation:skullBob 3s ease-in-out infinite;}
@keyframes skullBob{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
.app-title{
  font-family:'Creepster',cursive;
  font-size:clamp(2.2rem,8vw,3.4rem);
  color:var(--neon);letter-spacing:3px;line-height:1;
  text-shadow:0 0 14px rgba(255,34,68,0.5),0 0 38px rgba(255,34,68,0.12);
}
.app-version{
  display:inline-block;font-family:'Share Tech Mono',monospace;
  font-size:.62rem;color:var(--blood);
  border:1px solid var(--blood);border-radius:4px;
  padding:.1rem .38rem;margin-top:.3rem;letter-spacing:1px;
}
#tagline{font-size:.84rem;color:var(--dim);margin-top:.4rem;letter-spacing:.4px;}

/* ═══════════════ MONSTER ═══════════════ */
.monster-box{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:1rem 1.2rem;
  margin:1.1rem 0;display:flex;gap:.85rem;align-items:flex-start;
  position:relative;overflow:hidden;min-height:68px;
}
/* Animated side accent — fixed with proper positioning */
.monster-box::after{
  content:'';
  position:absolute;top:0;width:2px;bottom:0;
  background:linear-gradient(to bottom,transparent,var(--neon) 50%,transparent);
  animation:sideGlow 3s ease-in-out infinite;
  opacity:.7;
}
html[dir="rtl"] .monster-box::after{right:0;}
html[dir="ltr"] .monster-box::after{left:0;}
@keyframes sideGlow{0%,100%{transform:scaleY(0);transform-origin:top;}50%{transform:scaleY(1);transform-origin:top;}}

.mon-avatar{
  font-size:1.9rem;flex-shrink:0;
  width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,34,68,0.07);
  border-radius:9px;border:1px solid var(--border);
  transition:transform .3s;
}
.mon-name{font-size:.62rem;color:var(--neon);letter-spacing:2px;margin-bottom:.28rem;font-family:'Share Tech Mono',monospace;}
#monsterText{font-size:.88rem;line-height:1.7;color:var(--text);min-height:20px;}
.tcursor{
  display:inline-block;width:2px;height:12px;
  background:var(--neon);margin-right:1px;
  animation:tcBlink .7s ease-in-out infinite;
  vertical-align:middle;
}
@keyframes tcBlink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ═══════════════ INPUT CARD ═══════════════ */
.input-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.2rem;margin-bottom:.9rem;
}
#inputLabel{
  font-size:.72rem;color:var(--dim);
  margin-bottom:.55rem;display:block;
  letter-spacing:1px;font-family:'Share Tech Mono',monospace;
}
.input-row{display:flex;gap:.45rem;}
#urlInput{
  flex:1;padding:.78rem .9rem;
  background:rgba(0,0,0,0.5);
  border:1.5px solid rgba(155,27,27,0.4);
  border-radius:9px;color:var(--text);
  font-family:'Share Tech Mono',monospace;font-size:.86rem;
  outline:none;transition:all .25s;
  direction:ltr;text-align:left;
}
#urlInput:focus{
  border-color:var(--neon);
  box-shadow:0 0 0 3px rgba(255,34,68,0.1),var(--shadow-red);
  background:rgba(10,0,5,0.72);
}
#urlInput::placeholder{color:#3a2a2a;}
#scanBtn{
  padding:.78rem 1.15rem;
  background:linear-gradient(135deg,var(--blood),#6a0000);
  border:1.5px solid var(--neon);border-radius:9px;
  color:#fff;font-family:'Tajawal',sans-serif;
  font-weight:900;font-size:.92rem;
  cursor:pointer;white-space:nowrap;
  letter-spacing:1px;transition:all .18s;
  min-width:90px;
}
#scanBtn:hover{background:linear-gradient(135deg,var(--neon),var(--blood));box-shadow:var(--shadow-red);transform:scale(1.02);}
#scanBtn:active{transform:scale(.97);}
#scanBtn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ═══════════════ LOADING ═══════════════ */
#loadingCard{
  display:none;
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.2rem;margin-bottom:.9rem;
}
.lsteps{display:grid;gap:.38rem;margin-bottom:.85rem;}
.lstep{
  display:flex;align-items:center;gap:.55rem;
  font-family:'Share Tech Mono',monospace;font-size:.72rem;
  color:#3a2a2a;transition:color .25s;
}
.lstep.on{color:var(--neon);}
.lstep.done{color:#2a6a4a;}
.lstep-dot{
  width:7px;height:7px;border-radius:50%;
  background:#1a0a0a;border:1px solid #3a1a1a;
  transition:all .25s;flex-shrink:0;
}
.lstep.on .lstep-dot{background:var(--neon);box-shadow:0 0 7px var(--neon);animation:dotPop .5s ease-in-out infinite alternate;}
.lstep.done .lstep-dot{background:#00AA55;border-color:#00AA55;}
@keyframes dotPop{from{transform:scale(1);}to{transform:scale(1.5);}}
.prog-track{height:3px;background:rgba(255,34,68,0.08);border-radius:2px;overflow:hidden;}
#progressFill{height:100%;background:linear-gradient(90deg,var(--blood),var(--neon));border-radius:2px;width:0%;transition:width .28s ease-out;}

/* ═══════════════ RESULT ═══════════════ */
#resultCard{
  display:none;border-radius:var(--radius);
  padding:1.35rem;margin-bottom:.9rem;
  animation:cardPop .38s cubic-bezier(.34,1.56,.64,1);
}
@keyframes cardPop{from{opacity:0;transform:translateY(18px) scale(.95);}to{opacity:1;transform:none;}}

#resultCard.safe{background:rgba(0,52,26,0.2);border:1.5px solid rgba(0,255,136,0.32);}
#resultCard.warning{background:rgba(52,36,0,0.22);border:1.5px solid rgba(255,179,0,0.32);}
#resultCard.danger{
  background:rgba(72,0,10,0.28);border:1.5px solid rgba(255,34,68,0.42);
  animation:cardPop .3s cubic-bezier(.34,1.56,.64,1),dangerJolt .48s ease-in-out .32s;
}
@keyframes dangerJolt{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-5px);}40%{transform:translateX(5px);}
  60%{transform:translateX(-3px);}80%{transform:translateX(3px);}
}

.res-header{display:flex;align-items:center;gap:.85rem;margin-bottom:1rem;}
.res-badge{
  width:50px;height:50px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;
}
#resultCard.safe .res-badge{background:rgba(0,255,136,0.09);border:1px solid rgba(0,255,136,0.22);}
#resultCard.warning .res-badge{background:rgba(255,179,0,0.09);border:1px solid rgba(255,179,0,0.22);}
#resultCard.danger .res-badge{background:rgba(255,34,68,0.09);border:1px solid rgba(255,34,68,0.22);}

#resultVerdict{font-family:'Creepster',cursive;font-size:1.45rem;letter-spacing:1px;}
#resultCard.safe #resultVerdict{color:var(--green);text-shadow:var(--shadow-green);}
#resultCard.warning #resultVerdict{color:var(--yellow);text-shadow:0 0 14px rgba(255,179,0,0.4);}
#resultCard.danger #resultVerdict{color:var(--neon);text-shadow:var(--shadow-red);}

#resultDomain{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--dim);margin-top:.18rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}

.score-row{display:flex;align-items:center;gap:.65rem;margin-bottom:1rem;}
#scoreNum{font-family:'Share Tech Mono',monospace;font-size:1.25rem;font-weight:bold;min-width:42px;}
#resultCard.safe #scoreNum{color:var(--green);}
#resultCard.warning #scoreNum{color:var(--yellow);}
#resultCard.danger #scoreNum{color:var(--neon);}
.score-track{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
#scoreBar{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.34,1.56,.64,1);width:0%;}
#resultCard.safe #scoreBar{background:linear-gradient(90deg,#005c28,var(--green));}
#resultCard.warning #scoreBar{background:linear-gradient(90deg,#5c3c00,var(--yellow));}
#resultCard.danger #scoreBar{background:linear-gradient(90deg,var(--blood),var(--neon));}
.score-slash{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--dim);min-width:32px;}

#aiVerdict{
  background:rgba(0,0,0,0.26);border-radius:9px;
  padding:.85rem .95rem;margin-bottom:1rem;
  font-size:.86rem;line-height:1.75;font-style:italic;border-right:3px solid;
}
html[dir="ltr"] #aiVerdict{border-right:none;border-left:3px solid;}
#resultCard.safe #aiVerdict{border-color:var(--green);color:#aaffd4;}
#resultCard.warning #aiVerdict{border-color:var(--yellow);color:#ffe29a;}
#resultCard.danger #aiVerdict{border-color:var(--neon);color:#ffaab5;}

#checksTitle{font-size:.68rem;color:var(--dim);letter-spacing:2px;margin-bottom:.55rem;font-family:'Share Tech Mono',monospace;}
#checksGrid{display:grid;gap:.38rem;}
.ci{
  display:flex;align-items:center;gap:.55rem;
  padding:.52rem .82rem;background:rgba(0,0,0,0.2);
  border-radius:7px;font-size:.8rem;border-right:2px solid;
}
html[dir="ltr"] .ci{border-right:none;border-left:2px solid;}
.ci.chk-ok{border-color:var(--green);}
.ci.chk-bad{border-color:var(--neon);}
.ci.chk-warn{border-color:var(--yellow);}

/* Share button */
.share-row{display:flex;justify-content:flex-end;margin-top:.8rem;}
.share-btn{
  display:flex;align-items:center;gap:.4rem;
  padding:.4rem .85rem;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);border-radius:7px;
  color:var(--dim2);font-family:'Tajawal',sans-serif;font-size:.78rem;
  cursor:pointer;transition:all .18s;
}
.share-btn:hover{background:rgba(255,255,255,0.09);color:var(--text);}

/* ═══════════════ TIPS ═══════════════ */
#tipsCard{
  display:none;
  background:rgba(55,25,0,0.22);
  border:1px solid rgba(255,100,0,0.2);
  border-radius:var(--radius);padding:.85rem 1rem;
  margin-bottom:.9rem;font-size:.78rem;color:#cc9940;line-height:1.7;
}
#tipsCard strong{color:var(--yellow);}

/* ═══════════════ DISCLAIMER ═══════════════ */
.disclaimer{
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:9px;padding:.7rem .9rem;
  font-size:.72rem;color:#4a3a3a;line-height:1.6;
  margin-bottom:.9rem;text-align:center;
}

/* ═══════════════ AI BANNER ═══════════════ */
.ai-banner{
  background:linear-gradient(135deg,rgba(55,0,75,0.28),rgba(18,0,38,0.38));
  border:1px solid rgba(180,0,255,0.22);
  border-radius:var(--radius);padding:.95rem 1.1rem;
  margin-bottom:.9rem;display:flex;gap:.75rem;align-items:flex-start;
}
.ai-banner-icon{font-size:1.3rem;flex-shrink:0;margin-top:.08rem;}
.ai-banner-title{font-size:.75rem;font-weight:700;color:#CC88FF;letter-spacing:1px;margin-bottom:.25rem;}
.ai-banner-desc{font-size:.74rem;color:#9060AA;line-height:1.6;}

/* ═══════════════ SOCIAL ═══════════════ */
.social-row{display:flex;gap:.6rem;margin-bottom:.9rem;}
.soc-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:.45rem;
  padding:.65rem;border-radius:9px;font-family:'Tajawal',sans-serif;
  font-size:.82rem;font-weight:700;cursor:pointer;
  text-decoration:none;transition:all .18s;border:1.5px solid;
}
.soc-x{background:rgba(0,0,0,0.38);border-color:rgba(255,255,255,0.14);color:#bbb;}
.soc-x:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.35);color:#fff;transform:scale(1.02);}
.soc-tg{background:rgba(0,65,110,0.2);border-color:rgba(0,130,200,0.28);color:#5ab4e4;}
.soc-tg:hover{background:rgba(0,130,200,0.12);border-color:rgba(0,130,200,0.55);transform:scale(1.02);}

/* ═══════════════ HISTORY ═══════════════ */
#histSection{display:none;margin-bottom:1.2rem;}
.sec-label{font-size:.68rem;color:var(--dim);letter-spacing:2px;margin-bottom:.55rem;font-family:'Share Tech Mono',monospace;}
#histList{display:grid;gap:.32rem;}
.hist-item{
  display:flex;align-items:center;gap:.55rem;
  padding:.52rem .82rem;background:var(--panel);
  border:1px solid var(--border);border-radius:8px;
  cursor:pointer;transition:all .18s;font-size:.78rem;
}
.hist-item:hover{border-color:rgba(255,34,68,0.32);background:rgba(255,34,68,0.04);}
.hist-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.hist-dot.safe{background:var(--green);}
.hist-dot.warning{background:var(--yellow);}
.hist-dot.danger{background:var(--neon);}
.hist-url{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--dim);direction:ltr;text-align:left;}
.hist-score{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--dim);}

/* ═══════════════ FOOTER ═══════════════ */
footer{
  text-align:center;padding:1.4rem 0 .8rem;
  font-size:.7rem;color:#282028;
  border-top:1px solid rgba(100,0,15,0.1);
  margin-top:1rem;
}
footer a{color:#4a2a2a;text-decoration:none;}
footer a:hover{color:var(--dim);}
.hidden{display:none!important;}
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="bg-scanlines"></div>
<div class="bg-grid"></div>
<div id="particles"></div>

<!-- ═══ LANGUAGE BAR ═══ -->
<div id="langBar">
  <button class="lbtn on" onclick="setLang('ar')">🇸🇦 العربية</button>
  <div class="lsep"></div>
  <button class="lbtn" onclick="setLang('en')">🇺🇸 English</button>
  <div class="lsep"></div>
  <button class="lbtn" onclick="setLang('fr')">🇫🇷 Français</button>
  <div class="lsep"></div>
  <button class="lbtn" onclick="setLang('es')">🇪🇸 Español</button>
  <div class="lsep"></div>
  <button class="lbtn" onclick="setLang('tr')">🇹🇷 Türkçe</button>
  <div class="lsep"></div>
  <button class="lbtn" onclick="setLang('de')">🇩🇪 Deutsch</button>
</div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-ring"><span class="logo-skull">💀</span></div>
    <h1 class="app-title">LinkReaper</h1>
    <span class="app-version">v3.1</span>
    <p id="tagline"></p>
  </div>

  <!-- MONSTER -->
  <div class="monster-box">
    <div class="mon-avatar" id="monAvatar">💀</div>
    <div style="flex:1">
      <div class="mon-name">// REAPER.EXE v3.1</div>
      <div id="monsterText"><span class="tcursor"></span></div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-card">
    <span id="inputLabel"></span>
    <div class="input-row">
      <input type="url" id="urlInput" autocomplete="off" spellcheck="false"/>
      <button id="scanBtn" onclick="startScan()">🔍 <span id="scanBtnTxt"></span></button>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loadingCard">
    <div class="lsteps" id="lsteps">
      <div class="lstep" id="ls0"><div class="lstep-dot"></div><span id="lt0"></span></div>
      <div class="lstep" id="ls1"><div class="lstep-dot"></div><span id="lt1"></span></div>
      <div class="lstep" id="ls2"><div class="lstep-dot"></div><span id="lt2"></span></div>
      <div class="lstep" id="ls3"><div class="lstep-dot"></div><span id="lt3"></span></div>
      <div class="lstep" id="ls4"><div class="lstep-dot"></div><span id="lt4"></span></div>
    </div>
    <div class="prog-track"><div id="progressFill"></div></div>
  </div>

  <!-- RESULT -->
  <div id="resultCard">
    <div class="res-header">
      <div class="res-badge" id="resBadge"></div>
      <div style="flex:1;min-width:0;">
        <div id="resultVerdict"></div>
        <div id="resultDomain"></div>
      </div>
    </div>
    <div class="score-row">
      <span id="scoreNum">0</span>
      <div class="score-track"><div id="scoreBar"></div></div>
      <span class="score-slash">/100</span>
    </div>
    <div id="aiVerdict"></div>
    <div id="checksTitle"></div>
    <div id="checksGrid"></div>
    <div class="share-row">
      <button class="share-btn" id="shareBtn" onclick="shareResult()">🔗 <span id="shareTxt">مشاركة النتيجة</span></button>
    </div>
  </div>

/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
let lang = 'ar';
let history = [];
let lastResult = null;
let isScanning = false;

/* ══════════════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════════════ */
(function initParticles(){
  const c = document.getElementById('particles');
  for(let i=0;i<22;i++){
    const p = document.createElement('div');
    p.className='ptcl';
    p.style.cssText=`right:${Math.random()*100}%;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;`;
    c.appendChild(p);
  }
})();

/* ══════════════════════════════════════════════════
   TYPE EFFECT
══════════════════════════════════════════════════ */
let typeTimer = null;
function typeText(el, txt, speed=26){
  return new Promise(res=>{
    if(typeTimer) clearInterval(typeTimer);
    el.innerHTML='<span class="tcursor"></span>';
    let i=0;
    typeTimer=setInterval(()=>{
      if(i<txt.length){
        el.innerHTML=txt.slice(0,++i)+'<span class="tcursor"></span>';
      } else {
        clearInterval(typeTimer);
        typeTimer=null;
        el.innerHTML=txt+'<span class="tcursor"></span>';
        res();
      }
    },speed);
  });
}

function countUp(el,target,ms=850){
  const t0=performance.now();
  (function step(now){
    const p=Math.min((now-t0)/ms,1);
    const e=1-Math.pow(1-p,3);
    el.textContent=Math.round(target*e);
    if(p<1) requestAnimationFrame(step);
  })(performance.now());
}

/* ══════════════════════════════════════════════════
   SET LANGUAGE
══════════════════════════════════════════════════ */
function setLang(l){
  lang=l;
  const L=T[l];
  const html=document.documentElement;
  html.setAttribute('lang',l);
  html.setAttribute('dir',L.dir);

  // lang buttons
  document.querySelectorAll('.lbtn').forEach(b=>{
    b.classList.toggle('on', b.getAttribute('onclick').includes(`'${l}'`));
  });

  // Static UI strings
  document.getElementById('tagline').textContent=L.tagline;
  document.getElementById('inputLabel').textContent=L.inputLabel;
  document.getElementById('scanBtnTxt').textContent=L.scanBtn;
  document.getElementById('checksTitle').textContent=L.checksTitle;
  document.getElementById('histLabel').textContent=L.histLabel;
  document.getElementById('bannerTitle').textContent=L.bannerTitle;
  document.getElementById('bannerDesc').textContent=L.bannerDesc;
  document.getElementById('xTxt').textContent=L.xTxt;
  document.getElementById('tgTxt').textContent=L.tgTxt;
  document.getElementById('shareTxt').textContent=L.share;
  document.getElementById('disclaimerEl').textContent=L.disclaimer;
  document.getElementById('footerEl').innerHTML=`${L.footer} &nbsp;•&nbsp; <span style="color:#5a2a2a">${L.footerSub}</span>`;

  // Loading step labels
  for(let i=0;i<5;i++) document.getElementById('lt'+i).textContent=L.steps[i];

  // Monster idle
  typeText(document.getElementById('monsterText'),L.idle);
  document.getElementById('monAvatar').textContent='💀';

  // Tips card - update if visible
  const tc=document.getElementById('tipsCard');
  if(tc.style.display!=='none'){
    tc.innerHTML=`<strong>${L.tips.split(':')[0]}:</strong>${L.tips.split(':').slice(1).join(':')}`;
  }

  // Re-render existing result if any
  if(lastResult){
    const {score,level,checks,domain,rawUrl}=lastResult;
    renderResult(score,level,checks,domain,rawUrl,false);
  }

  renderHistory();
}

/* ══════════════════════════════════════════════════
   URL ANALYSIS ENGINE
══════════════════════════════════════════════════ */
function analyzeURL(rawUrl){
  const L=T[lang];const C=L.ck;
  let score=100;
  const checks=[];
  let fullUrl=rawUrl;
  let parsed;

  try{
    if(!/^https?:\/\//i.test(rawUrl)) fullUrl='http://'+rawUrl;
    parsed=new URL(fullUrl);
  }catch(e){
    return{score:0,level:'danger',checks:[{cls:'chk-bad',txt:C.ipBad}],domain:'???'};
  }

  const domain=parsed.hostname.toLowerCase();
  const protocol=parsed.protocol;

  // 1. HTTPS
  if(protocol==='https:'){checks.push({cls:'chk-ok',txt:C.httpsOk});}
  else{checks.push({cls:'chk-bad',txt:C.httpsBad});score-=30;}

  // 2. IP address
  if(/^(\d{1,3}\.){3}\d{1,3}$/.test(domain)){checks.push({cls:'chk-bad',txt:C.ipBad});score-=40;}
  else{checks.push({cls:'chk-ok',txt:C.ipOk});}

  // 3. Trusted domains
  const trusted=['google.com','youtube.com','twitter.com','x.com','facebook.com','instagram.com','github.com','microsoft.com','apple.com','amazon.com','wikipedia.org','whatsapp.com','linkedin.com','tiktok.com','snapchat.com','netflix.com','paypal.com','adobe.com','dropbox.com','zoom.us','spotify.com','reddit.com','twitch.tv','discord.com','telegram.org'];
  const isTrusted=trusted.some(t=>domain===t||domain.endsWith('.'+t));
  if(isTrusted){checks.push({cls:'chk-ok',txt:C.trustedOk});score=Math.min(score+20,100);}

  // 4. Bad TLDs
  const badTlds=['.xyz','.tk','.ml','.ga','.cf','.gq','.top','.click','.loan','.win','.download','.stream','.party','.bid','.review','.accountant','.science','.faith','.date'];
  if(badTlds.some(t=>domain.endsWith(t))){checks.push({cls:'chk-bad',txt:C.tldBad});score-=25;}
  else if(!isTrusted){checks.push({cls:'chk-ok',txt:C.tldOk});}

  // 5. Phishing keywords
  const phish=['login','verify','secure','account','update','confirm','paypal','apple-id','microsoft','amazon','bank','password','signin','wallet','crypto','free','prize','winner','urgent','suspended','alert','activation','webscr','cmd=','ebayisapi','recover','password-reset'];
  const found=phish.filter(w=>rawUrl.toLowerCase().includes(w));
  if(found.length>=3){checks.push({cls:'chk-bad',txt:C.phishMany(found.length,found.slice(0,3).join(', '))});score-=30;}
  else if(found.length>=1){checks.push({cls:'chk-warn',txt:C.phishOne(found[0])});score-=8;}
  else{checks.push({cls:'chk-ok',txt:C.phishOk});}

  // 6. URL length
  if(rawUrl.length>150){checks.push({cls:'chk-bad',txt:C.longBad(rawUrl.length)});score-=15;}
  else if(rawUrl.length>80){checks.push({cls:'chk-warn',txt:C.longWarn(rawUrl.length)});score-=3;}
  else{checks.push({cls:'chk-ok',txt:C.longOk(rawUrl.length)});}

  // 7. Subdomains
  const parts=domain.split('.');
  if(parts.length>5){checks.push({cls:'chk-bad',txt:C.subBad(parts.length-2)});score-=20;}
  else if(parts.length>3){checks.push({cls:'chk-warn',txt:C.subWarn});score-=5;}
  else{checks.push({cls:'chk-ok',txt:C.subOk});}

  // 8. Special chars in domain
  if(/[^a-z0-9.\-]/.test(domain)){checks.push({cls:'chk-bad',txt:C.specialBad});score-=25;}

  score=Math.max(0,Math.min(100,score));
  const level=score>=72?'safe':score>=42?'warning':'danger';
  return{score,level,checks,domain};
}

/* ══════════════════════════════════════════════════
   HISTORY
══════════════════════════════════════════════════ */
function addHistory(url,level,score){
  history.unshift({url,level,score});
  if(history.length>6) history=history.slice(0,6);
  renderHistory();
}
function renderHistory(){
  const sec=document.getElementById('histSection');
  const list=document.getElementById('histList');
  if(!history.length){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=history.map((h,i)=>`
    <div class="hist-item" onclick="reScan(${i})">
      <div class="hist-dot ${h.level}"></div>
      <span class="hist-url">${escHtml(h.url)}</span>
      <span class="hist-score">${h.score}/100</span>
    </div>`).join('');
}
function reScan(i){
  document.getElementById('urlInput').value=history[i].url;
  startScan();
}
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ══════════════════════════════════════════════════
   SHARE
══════════════════════════════════════════════════ */
function shareResult(){
  if(!lastResult) return;
  const L=T[lang];
  const txt=L.shareText(lastResult.domain,lastResult.score,lastResult.level);
  if(navigator.share){
    navigator.share({title:'LinkReaper',text:txt}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(txt).then(()=>{
      const btn=document.getElementById('shareBtn');
      const orig=btn.innerHTML;
      btn.innerHTML='✅ <span>'+L.share+'!</span>';
      setTimeout(()=>{btn.innerHTML=orig;},2000);
    }).catch(()=>{});
  }
}

/* ══════════════════════════════════════════════════
   MAIN SCAN
══════════════════════════════════════════════════ */
async function startScan(){
  if(isScanning) return;
  const L=T[lang];
  const raw=document.getElementById('urlInput').value.trim();

  if(!raw){
    const inp=document.getElementById('urlInput');
    inp.style.borderColor='var(--neon)';
    inp.style.boxShadow='var(--shadow-red)';
    typeText(document.getElementById('monsterText'),L.empty);
    setTimeout(()=>{inp.style.borderColor='';inp.style.boxShadow='';},900);
    return;
  }

  isScanning=true;
  document.getElementById('scanBtn').disabled=true;
  document.getElementById('resultCard').style.display='none';
  document.getElementById('tipsCard').style.display='none';

  const lc=document.getElementById('loadingCard');
  lc.style.display='block';
  const lsteps=document.querySelectorAll('.lstep');
  const prog=document.getElementById('progressFill');
  prog.style.width='0%';

  document.getElementById('monAvatar').textContent='🔍';
  typeText(document.getElementById('monsterText'),L.scanning,20);

  for(let i=0;i<lsteps.length;i++){
    lsteps.forEach((s,j)=>{
      if(j<i)s.className='lstep done';
      else if(j===i)s.className='lstep on';
      else s.className='lstep';
    });
    prog.style.width=((i+1)/lsteps.length*100)+'%';
    if(typeTimer) clearInterval(typeTimer);
    typeText(document.getElementById('monsterText'),L.stepMsgs[i],16);
    await sleep(360);
  }
  lsteps.forEach(s=>s.className='lstep done');
  await sleep(150);
  lc.style.display='none';

  const result=analyzeURL(raw);
  result.rawUrl=raw;
  lastResult=result;

  renderResult(result.score,result.level,result.checks,result.domain,raw,true);
  addHistory(raw,result.level,result.score);

  isScanning=false;
  document.getElementById('scanBtn').disabled=false;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

/* ══════════════════════════════════════════════════
   RENDER RESULT
══════════════════════════════════════════════════ */
function renderResult(score,level,checks,domain,rawUrl,animate){
  const L=T[lang];
  const card=document.getElementById('resultCard');

  card.className=level; // safe | warning | danger
  card.style.display='block';

  document.getElementById('resBadge').textContent=L.badge[level];
  document.getElementById('resultVerdict').textContent=L.verdict[level];
  document.getElementById('resultDomain').textContent=domain||rawUrl;

  if(animate){
    countUp(document.getElementById('scoreNum'),score);
    setTimeout(()=>{document.getElementById('scoreBar').style.width=score+'%';},120);
  } else {
    document.getElementById('scoreNum').textContent=score;
    document.getElementById('scoreBar').style.width=score+'%';
  }

  // AI verdict
  const vArr=L.ai[level];
  const verdict=vArr[Math.floor(Math.random()*vArr.length)](domain||rawUrl,score);
  document.getElementById('aiVerdict').textContent=verdict;

  // Checks
  document.getElementById('checksGrid').innerHTML=checks.map(c=>`
    <div class="ci ${c.cls}">
      <span>${c.cls==='chk-ok'?'✅':c.cls==='chk-warn'?'⚠️':'❌'}</span>
      <span>${escHtml(c.txt)}</span>
    </div>`).join('');

  // Tips
  if(level==='danger'){
    const tc=document.getElementById('tipsCard');
    const parts=L.tips.split(':');
    tc.innerHTML=`<strong>${parts[0]}:</strong>${parts.slice(1).join(':')}`;
    tc.style.display='block';
  }

  // Monster reaction
  document.getElementById('monAvatar').textContent=level==='safe'?'😌':level==='warning'?'😒':'😱';
  const short=L.monReact[level];
  typeText(document.getElementById('monsterText'),short,22);

  if(animate) card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

   KEYBOARD

document.getElementById('urlInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') startScan();
});
