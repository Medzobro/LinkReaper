<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="LinkReaper — Real Threat Intelligence | كاشف الروابط الحقيقي">
<meta name="theme-color" content="#060608">
<title>LinkReaper — Threat Intelligence v4</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Tajawal:wght@300;400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════ CORE VARIABLES ═══════════════ */
:root{
  --blood:#9B1B1B;--neon:#FF2244;--dark:#060608;--panel:#0d0d12;
  --panel2:#111118;--border:rgba(180,20,40,0.3);
  --green:#00FF88;--yellow:#FFB300;--purple:#BB44FF;--blue:#44AAFF;
  --text:#E0D5D5;--dim:#6B5B5B;--dim2:#9B8B8B;
  --shadow-red:0 0 20px rgba(255,34,68,0.35);
  --shadow-green:0 0 20px rgba(0,255,136,0.35);
  --shadow-yellow:0 0 20px rgba(255,179,0,0.35);
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--text);font-family:'Tajawal',sans-serif;overflow-x:hidden;min-height:100vh;}

/* ═══ BG ═══ */
.bg-base{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 55% at 50% -5%,rgba(110,0,18,.42),transparent 60%),
    radial-gradient(ellipse 35% 35% at 95% 95%,rgba(60,0,10,.28),transparent 60%),var(--dark);}
.bg-lines{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(140,0,20,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(140,0,20,.04) 1px,transparent 1px);
  background-size:50px 50px;animation:gScroll 20s linear infinite;}
@keyframes gScroll{to{background-position:0 50px;}}
#pts{position:fixed;inset:0;z-index:0;pointer-events:none;}
.pt{position:absolute;border-radius:50%;background:var(--neon);animation:ptF linear infinite;opacity:0;}
@keyframes ptF{0%{transform:translateY(100vh);opacity:0;}10%{opacity:.35;}90%{opacity:.12;}100%{transform:translateY(-5vh) translateX(15px);opacity:0;}}

/* ═══ LANG BAR ═══ */
#langBar{position:fixed;top:0;left:0;right:0;z-index:300;
  background:rgba(6,6,8,.96);border-bottom:1px solid var(--border);
  padding:.42rem .8rem;display:flex;align-items:center;gap:.32rem;
  overflow-x:auto;scrollbar-width:none;backdrop-filter:blur(12px);}
#langBar::-webkit-scrollbar{display:none;}
.lbtn{flex-shrink:0;padding:.26rem .6rem;background:transparent;
  border:1px solid rgba(155,27,27,.28);border-radius:5px;color:var(--dim);
  font-family:'Tajawal',sans-serif;font-size:.72rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.lbtn:hover{border-color:var(--neon);color:var(--text);}
.lbtn.on{background:rgba(255,34,68,.13);border-color:var(--neon);color:var(--neon);}
.lsep{width:1px;height:15px;background:var(--border);flex-shrink:0;}

/* ═══ APP ═══ */
.app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:4.6rem 1.1rem 4rem;min-height:100vh;}

/* ═══ HEADER ═══ */
.hdr{text-align:center;padding:1.8rem 0 1.2rem;}
.logo-ring{width:82px;height:82px;border-radius:50%;border:2px solid var(--blood);
  display:flex;align-items:center;justify-content:center;margin:0 auto .7rem;position:relative;
  animation:rPulse 2.5s ease-in-out infinite;
  background:radial-gradient(circle,rgba(100,0,15,.28),transparent 70%);}
.logo-ring::before{content:'';position:absolute;inset:-6px;border-radius:50%;
  border:1px solid rgba(255,34,68,.11);animation:rPulse 2.5s ease-in-out infinite reverse;}
@keyframes rPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,34,68,.2);}50%{box-shadow:0 0 24px 5px rgba(255,34,68,.09);}}
.skull{font-size:2.4rem;filter:drop-shadow(0 0 8px rgba(255,34,68,.5));animation:sBob 3s ease-in-out infinite;}
@keyframes sBob{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
.app-title{font-family:'Creepster',cursive;font-size:clamp(2rem,7vw,3.2rem);
  color:var(--neon);letter-spacing:3px;line-height:1;
  text-shadow:0 0 14px rgba(255,34,68,.5),0 0 36px rgba(255,34,68,.11);}
.vtag{display:inline-flex;align-items:center;gap:.35rem;margin-top:.3rem;}
.vbadge{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--blood);
  border:1px solid var(--blood);border-radius:4px;padding:.08rem .35rem;letter-spacing:1px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:livePulse 1.5s ease-in-out infinite;}
.live-txt{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--green);letter-spacing:1px;}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.4;}}
#tagline{font-size:.82rem;color:var(--dim);margin-top:.35rem;letter-spacing:.3px;}

/* ═══ MONSTER ═══ */
.mon-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:.95rem 1.15rem;margin:1rem 0;display:flex;gap:.8rem;align-items:flex-start;
  position:relative;overflow:hidden;min-height:64px;}
.mon-box::after{content:'';position:absolute;top:0;width:2px;bottom:0;
  background:linear-gradient(to bottom,transparent,var(--neon) 50%,transparent);
  animation:sGlow 3s ease-in-out infinite;opacity:.6;}
html[dir="rtl"] .mon-box::after{right:0;}
html[dir="ltr"] .mon-box::after{left:0;}
@keyframes sGlow{0%,100%{transform:scaleY(0);transform-origin:top;}50%{transform:scaleY(1);transform-origin:top;}}
.mon-av{font-size:1.8rem;flex-shrink:0;width:40px;height:40px;display:flex;align-items:center;
  justify-content:center;background:rgba(255,34,68,.07);border-radius:8px;border:1px solid var(--border);}
.mon-name{font-size:.6rem;color:var(--neon);letter-spacing:2px;margin-bottom:.25rem;font-family:'Share Tech Mono',monospace;}
#monTxt{font-size:.86rem;line-height:1.7;color:var(--text);min-height:20px;}
.tc{display:inline-block;width:2px;height:12px;background:var(--neon);
  animation:tcB .7s ease-in-out infinite;vertical-align:middle;margin-right:1px;}
@keyframes tcB{0%,100%{opacity:1;}50%{opacity:0;}}

/* ═══ INPUT ═══ */
.inp-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:1.15rem;margin-bottom:.85rem;}
#inputLabel{font-size:.7rem;color:var(--dim);margin-bottom:.52rem;display:block;letter-spacing:1px;font-family:'Share Tech Mono',monospace;}
.inp-row{display:flex;gap:.42rem;}
#urlInput{flex:1;padding:.75rem .88rem;background:rgba(0,0,0,.5);border:1.5px solid rgba(155,27,27,.38);
  border-radius:9px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.85rem;
  outline:none;transition:all .22s;direction:ltr;text-align:left;}
#urlInput:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(255,34,68,.09),var(--shadow-red);background:rgba(10,0,5,.7);}
#urlInput::placeholder{color:#3a2a2a;}
#scanBtn{padding:.75rem 1.1rem;background:linear-gradient(135deg,var(--blood),#6a0000);
  border:1.5px solid var(--neon);border-radius:9px;color:#fff;font-family:'Tajawal',sans-serif;
  font-weight:900;font-size:.9rem;cursor:pointer;white-space:nowrap;letter-spacing:1px;
  transition:all .16s;min-width:88px;}
#scanBtn:hover{background:linear-gradient(135deg,var(--neon),var(--blood));box-shadow:var(--shadow-red);transform:scale(1.02);}
#scanBtn:active{transform:scale(.97);}
#scanBtn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* ═══ ENGINE STATUS ═══ */
#engineCard{display:none;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:1.15rem;margin-bottom:.85rem;}
.eng-title{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--dim);letter-spacing:2px;margin-bottom:.7rem;}
.eng-layers{display:grid;gap:.38rem;}
.eng-layer{display:flex;align-items:center;gap:.7rem;padding:.5rem .8rem;
  background:rgba(0,0,0,.25);border-radius:8px;border:1px solid rgba(255,255,255,.04);}
.eng-icon{font-size:.95rem;width:22px;text-align:center;flex-shrink:0;}
.eng-info{flex:1;}
.eng-name{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--dim2);letter-spacing:1px;}
.eng-status{font-size:.72rem;color:var(--dim);margin-top:.1rem;}
.eng-badge{font-family:'Share Tech Mono',monospace;font-size:.65rem;padding:.18rem .5rem;
  border-radius:4px;border:1px solid;white-space:nowrap;flex-shrink:0;}
.eng-badge.waiting{color:#3a2a2a;border-color:#2a1a1a;}
.eng-badge.running{color:var(--neon);border-color:rgba(255,34,68,.4);animation:badgePulse .8s ease-in-out infinite alternate;}
.eng-badge.done-ok{color:var(--green);border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.05);}
.eng-badge.done-warn{color:var(--yellow);border-color:rgba(255,179,0,.3);background:rgba(255,179,0,.05);}
.eng-badge.done-bad{color:var(--neon);border-color:rgba(255,34,68,.35);background:rgba(255,34,68,.06);}
.eng-badge.done-skip{color:var(--dim);border-color:rgba(100,80,80,.2);}
@keyframes badgePulse{from{opacity:.6;}to{opacity:1;}}
.prog-track{height:2px;background:rgba(255,34,68,.08);border-radius:1px;overflow:hidden;margin-top:.7rem;}
#progFill{height:100%;background:linear-gradient(90deg,var(--blood),var(--neon));border-radius:1px;width:0%;transition:width .3s ease-out;}

/* ═══ RESULT CARD ═══ */
#resCard{display:none;border-radius:var(--r);padding:1.3rem;margin-bottom:.85rem;
  animation:cPop .38s cubic-bezier(.34,1.56,.64,1);}
@keyframes cPop{from{opacity:0;transform:translateY(16px) scale(.95);}to{opacity:1;transform:none;}}
#resCard.safe{background:rgba(0,50,24,.2);border:1.5px solid rgba(0,255,136,.3);}
#resCard.warning{background:rgba(50,34,0,.22);border:1.5px solid rgba(255,179,0,.3);}
#resCard.danger{background:rgba(70,0,10,.28);border:1.5px solid rgba(255,34,68,.4);
  animation:cPop .3s cubic-bezier(.34,1.56,.64,1),dJolt .46s ease-in-out .3s;}
@keyframes dJolt{0%,100%{transform:translateX(0);}20%{transform:translateX(-5px);}
  40%{transform:translateX(5px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}}

/* Score ring */
.res-top{display:flex;align-items:center;gap:1rem;margin-bottom:1.1rem;}
.score-ring-wrap{flex-shrink:0;position:relative;width:80px;height:80px;}
.score-ring-wrap svg{position:absolute;inset:0;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:6;}
.ring-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.34,1.2,.64,1);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-num{font-family:'Share Tech Mono',monospace;font-size:1.3rem;font-weight:bold;line-height:1;}
.ring-label{font-size:.5rem;color:var(--dim);letter-spacing:1px;margin-top:.1rem;}
.res-meta{flex:1;min-width:0;}
#resVerdict{font-family:'Creepster',cursive;font-size:1.4rem;letter-spacing:1px;}
#resCard.safe #resVerdict{color:var(--green);text-shadow:var(--shadow-green);}
#resCard.warning #resVerdict{color:var(--yellow);text-shadow:var(--shadow-yellow);}
#resCard.danger #resVerdict{color:var(--neon);text-shadow:var(--shadow-red);}
#resDomain{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--dim);
  margin-top:.15rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.threat-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem;}
.ttag{font-family:'Share Tech Mono',monospace;font-size:.6rem;padding:.15rem .45rem;
  border-radius:4px;border:1px solid;letter-spacing:.5px;}
.ttag.malware{color:#FF6644;border-color:rgba(255,102,68,.3);background:rgba(255,102,68,.07);}
.ttag.phishing{color:var(--neon);border-color:rgba(255,34,68,.3);background:rgba(255,34,68,.07);}
.ttag.abuse{color:var(--yellow);border-color:rgba(255,179,0,.3);background:rgba(255,179,0,.07);}
.ttag.clean{color:var(--green);border-color:rgba(0,255,136,.25);background:rgba(0,255,136,.06);}
.ttag.suspicious{color:var(--purple);border-color:rgba(187,68,255,.3);background:rgba(187,68,255,.07);}

/* AI verdict */
#aiVerdict{background:rgba(0,0,0,.24);border-radius:9px;padding:.82rem .92rem;
  margin-bottom:1rem;font-size:.85rem;line-height:1.75;font-style:italic;border-right:3px solid;}
html[dir="ltr"] #aiVerdict{border-right:none;border-left:3px solid;}
#resCard.safe #aiVerdict{border-color:var(--green);color:#aaffd4;}
#resCard.warning #aiVerdict{border-color:var(--yellow);color:#ffe29a;}
#resCard.danger #aiVerdict{border-color:var(--neon);color:#ffaab5;}

/* API Source cards */
.src-title{font-size:.67rem;color:var(--dim);letter-spacing:2px;margin-bottom:.52rem;
  font-family:'Share Tech Mono',monospace;display:flex;align-items:center;gap:.5rem;}
.src-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.04);}
.src-grid{display:grid;gap:.38rem;margin-bottom:.9rem;}
.src-card{padding:.65rem .88rem;border-radius:9px;border:1px solid rgba(255,255,255,.05);
  background:rgba(0,0,0,.22);display:flex;align-items:center;gap:.7rem;}
.src-icon{font-size:1rem;flex-shrink:0;width:24px;text-align:center;}
.src-info{flex:1;min-width:0;}
.src-name{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--dim2);letter-spacing:.5px;}
.src-detail{font-size:.75rem;color:var(--text);margin-top:.1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.src-pill{font-family:'Share Tech Mono',monospace;font-size:.6rem;padding:.15rem .42rem;
  border-radius:4px;border:1px solid;white-space:nowrap;flex-shrink:0;}
.pill-safe{color:var(--green);border-color:rgba(0,255,136,.25);background:rgba(0,255,136,.06);}
.pill-warn{color:var(--yellow);border-color:rgba(255,179,0,.25);background:rgba(255,179,0,.06);}
.pill-bad{color:var(--neon);border-color:rgba(255,34,68,.3);background:rgba(255,34,68,.07);}
.pill-skip{color:var(--dim);border-color:rgba(100,80,80,.2);}
.pill-err{color:#888;border-color:rgba(100,80,80,.2);}

/* Heuristic checks */
.chk-grid{display:grid;gap:.35rem;margin-bottom:.9rem;}
.ci{display:flex;align-items:center;gap:.52rem;padding:.5rem .8rem;
  background:rgba(0,0,0,.2);border-radius:7px;font-size:.78rem;border-right:2px solid;}
html[dir="ltr"] .ci{border-right:none;border-left:2px solid;}
.ci.chk-ok{border-color:var(--green);}
.ci.chk-bad{border-color:var(--neon);}
.ci.chk-warn{border-color:var(--yellow);}

/* Share */
.share-row{display:flex;justify-content:flex-end;margin-top:.75rem;}
.share-btn{display:flex;align-items:center;gap:.38rem;padding:.38rem .8rem;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:7px;
  color:var(--dim2);font-family:'Tajawal',sans-serif;font-size:.76rem;cursor:pointer;transition:all .16s;}
.share-btn:hover{background:rgba(255,255,255,.08);color:var(--text);}

/* ═══ TIPS ═══ */
#tipsCard{display:none;background:rgba(55,25,0,.2);border:1px solid rgba(255,100,0,.18);
  border-radius:var(--r);padding:.82rem .95rem;margin-bottom:.85rem;
  font-size:.78rem;color:#cc9940;line-height:1.7;}
#tipsCard strong{color:var(--yellow);}

/* ═══ DISCLAIMER ═══ */
.disclaimer{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.05);
  border-radius:9px;padding:.65rem .88rem;font-size:.7rem;color:#4a3a3a;
  line-height:1.6;margin-bottom:.85rem;text-align:center;}

/* ═══ AI BANNER ═══ */
.ai-banner{background:linear-gradient(135deg,rgba(55,0,75,.26),rgba(18,0,38,.36));
  border:1px solid rgba(180,0,255,.2);border-radius:var(--r);padding:.9rem 1.05rem;
  margin-bottom:.85rem;display:flex;gap:.72rem;align-items:flex-start;}
.ai-icon{font-size:1.25rem;flex-shrink:0;margin-top:.06rem;}
.ai-ttl{font-size:.72rem;font-weight:700;color:#CC88FF;letter-spacing:1px;margin-bottom:.22rem;}
.ai-dsc{font-size:.72rem;color:#9060AA;line-height:1.6;}

/* ═══ SOCIAL ═══ */
.soc-row{display:flex;gap:.55rem;margin-bottom:.85rem;}
.soc-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:.42rem;
  padding:.62rem;border-radius:9px;font-family:'Tajawal',sans-serif;font-size:.8rem;
  font-weight:700;cursor:pointer;text-decoration:none;transition:all .16s;border:1.5px solid;}
.soc-x{background:rgba(0,0,0,.36);border-color:rgba(255,255,255,.13);color:#aaa;}
.soc-x:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.32);color:#fff;transform:scale(1.02);}
.soc-tg{background:rgba(0,62,108,.18);border-color:rgba(0,126,196,.26);color:#5ab0e0;}
.soc-tg:hover{background:rgba(0,126,196,.1);border-color:rgba(0,126,196,.52);transform:scale(1.02);}

/* ═══ HISTORY ═══ */
#histSec{display:none;margin-bottom:1.1rem;}
.sec-lbl{font-size:.67rem;color:var(--dim);letter-spacing:2px;margin-bottom:.52rem;font-family:'Share Tech Mono',monospace;}
#histList{display:grid;gap:.3rem;}
.hi{display:flex;align-items:center;gap:.52rem;padding:.5rem .8rem;background:var(--panel);
  border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:all .16s;font-size:.76rem;}
.hi:hover{border-color:rgba(255,34,68,.3);background:rgba(255,34,68,.04);}
.hd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.hd.safe{background:var(--green);}
.hd.warning{background:var(--yellow);}
.hd.danger{background:var(--neon);}
.hu{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--dim);direction:ltr;text-align:left;}
.hs{font-family:'Share Tech Mono',monospace;font-size:.66rem;color:var(--dim);}

/* ═══ FOOTER ═══ */
footer{text-align:center;padding:1.3rem 0 .7rem;font-size:.68rem;color:#282028;
  border-top:1px solid rgba(100,0,15,.1);margin-top:.8rem;}
footer span{color:#5a2a2a;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="bg-base"></div>
<div class="bg-lines"></div>
<div class="bg-grid"></div>
<div id="pts"></div>

<!-- LANG BAR -->
<div id="langBar">
  <button class="lbtn on" onclick="setLang('ar')">🇸🇦 العربية</button>
  <div class="lsep"></div>
  <button class="lbtn" onclick="setLang('en')">🇺🇸 English</button>
  <div class="lsep"></div>
  <button class="lbtn" onclick="setLang('fr')">🇫🇷 Français</button>
  <div class="lsep"></div>
  <button class="lbtn" onclick="setLang('es')">🇪🇸 Español</button>
  <div class="lsep"></div>
  <button class="lbtn" onclick="setLang('tr')">🇹🇷 Türkçe</button>
  <div class="lsep"></div>
  <button class="lbtn" onclick="setLang('de')">🇩🇪 Deutsch</button>
</div>

<div class="app">
  <!-- HEADER -->
  <div class="hdr">
    <div class="logo-ring"><span class="skull">💀</span></div>
    <h1 class="app-title">LinkReaper</h1>
    <div class="vtag">
      <span class="vbadge">v4.0</span>
      <div class="live-dot"></div>
      <span class="live-txt">LIVE INTEL</span>
    </div>
    <p id="tagline"></p>
  </div>

  <!-- MONSTER -->
  <div class="mon-box">
    <div class="mon-av" id="monAv">💀</div>
    <div style="flex:1">
      <div class="mon-name">// REAPER.EXE v4.0 — THREAT INTELLIGENCE ENGINE</div>
      <div id="monTxt"><span class="tc"></span></div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="inp-card">
    <span id="inputLabel"></span>
    <div class="inp-row">
      <input type="url" id="urlInput" autocomplete="off" spellcheck="false"/>
      <button id="scanBtn" onclick="startScan()">🔍 <span id="scanBtnTxt"></span></button>
    </div>
  </div>

  <!-- ENGINE STATUS -->
  <div id="engineCard">
    <div class="eng-title" id="engTitle"></div>
    <div class="eng-layers" id="engLayers">
      <div class="eng-layer" id="el0">
        <div class="eng-icon">🧬</div>
        <div class="eng-info">

/* ═══════════════════════════════════════════════════════
   TYPE EFFECT
═══════════════════════════════════════════════════════ */
function typeText(el,txt,spd=24){
  return new Promise(res=>{
    if(typeTimer){clearInterval(typeTimer);typeTimer=null;}
    el.innerHTML='<span class="tc"></span>';
    let i=0;
    typeTimer=setInterval(()=>{
      if(i<txt.length){el.innerHTML=txt.slice(0,++i)+'<span class="tc"></span>';}
      else{clearInterval(typeTimer);typeTimer=null;el.innerHTML=txt+'<span class="tc"></span>';res();}
    },spd);
  });
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

/* ═══════════════════════════════════════════════════════
   SCORE RING ANIMATION
═══════════════════════════════════════════════════════ */
function animateRing(score,level){
  const fill=document.getElementById('ringFill');
  const numEl=document.getElementById('ringNum');
  const circ=213.6;
  const offset=circ-(circ*score/100);

  const colors={safe:'#00FF88',warning:'#FFB300',danger:'#FF2244'};
  fill.style.stroke=colors[level]||'#FF2244';

  // Count up number
  const t0=performance.now();
  (function step(now){
    const p=Math.min((now-t0)/1000,1);
    const e=1-Math.pow(1-p,3);
    numEl.textContent=Math.round(score*e);
    fill.style.strokeDashoffset=circ-(circ*score/100*e);
    if(p<1)requestAnimationFrame(step);
  })(performance.now());

  numEl.style.color=colors[level];
}

/* ═══════════════════════════════════════════════════════
   HEURISTIC ENGINE
═══════════════════════════════════════════════════════ */
function runHeuristics(rawUrl){
  const L=T[lang];const C=L.ck;
  let score=100;const checks=[];
  let parsed;
  try{
    let u=rawUrl;
    if(!/^https?:\/\//i.test(u))u='http://'+u;
    parsed=new URL(u);
  }catch(e){return{score:0,checks:[{cls:'chk-bad',txt:C.ipBad}],domain:'???'};}

  const domain=parsed.hostname.toLowerCase();

  // HTTPS
  if(parsed.protocol==='https:'){checks.push({cls:'chk-ok',txt:C.httpsOk});}
  else{checks.push({cls:'chk-bad',txt:C.httpsBad});score-=28;}

  // IP
  if(/^(\d{1,3}\.){3}\d{1,3}$/.test(domain)){checks.push({cls:'chk-bad',txt:C.ipBad});score-=38;}
  else{checks.push({cls:'chk-ok',txt:C.ipOk});}

  // Trusted
  const trusted=['google.com','youtube.com','twitter.com','x.com','facebook.com','instagram.com',
    'github.com','microsoft.com','apple.com','amazon.com','wikipedia.org','whatsapp.com',
    'linkedin.com','tiktok.com','snapchat.com','netflix.com','paypal.com','adobe.com',
    'dropbox.com','zoom.us','spotify.com','reddit.com','twitch.tv','discord.com','telegram.org'];
  const isTrusted=trusted.some(t=>domain===t||domain.endsWith('.'+t));
  if(isTrusted){checks.push({cls:'chk-ok',txt:C.trusted});score=Math.min(score+18,100);}

  // Bad TLDs
  const badTlds=['.xyz','.tk','.ml','.ga','.cf','.gq','.top','.click','.loan','.win',
    '.download','.stream','.party','.bid','.review','.accountant','.science','.faith','.date'];
  if(!isTrusted&&badTlds.some(t=>domain.endsWith(t))){checks.push({cls:'chk-bad',txt:C.tldBad});score-=22;}
  else if(!isTrusted){checks.push({cls:'chk-ok',txt:C.tldOk});}

  // Phishing keywords
  const phish=['login','verify','secure','account','update','confirm','paypal','apple-id',
    'microsoft','amazon','bank','password','signin','wallet','crypto','free','prize',
    'winner','urgent','suspended','alert','activation','webscr','cmd=','recover'];
  const found=phish.filter(w=>rawUrl.toLowerCase().includes(w));
  if(found.length>=3){checks.push({cls:'chk-bad',txt:C.phishM(found.length,found.slice(0,3).join(', '))});score-=28;}
  else if(found.length>=1){checks.push({cls:'chk-warn',txt:C.phishO(found[0])});score-=8;}
  else{checks.push({cls:'chk-ok',txt:C.phishOk});}

  // Length
  if(rawUrl.length>150){checks.push({cls:'chk-bad',txt:C.longB(rawUrl.length)});score-=13;}
  else if(rawUrl.length>80){checks.push({cls:'chk-warn',txt:C.longW(rawUrl.length)});score-=3;}
  else{checks.push({cls:'chk-ok',txt:C.longOk(rawUrl.length)});}

  // Subdomains
  const parts=domain.split('.');
  if(parts.length>5){checks.push({cls:'chk-bad',txt:C.subB(parts.length-2)});score-=18;}
  else if(parts.length>3){checks.push({cls:'chk-warn',txt:C.subW});score-=5;}
  else{checks.push({cls:'chk-ok',txt:C.subOk});}

  // Special chars
  if(/[^a-z0-9.\-]/.test(domain)){checks.push({cls:'chk-bad',txt:C.specialBad});score-=22;}

  return{score:Math.max(0,Math.min(100,score)),checks,domain};
}

// 1. Google Safe Browsing
async function checkGSB(url){
  try{
    const res=await fetch(`https://safebrowsing.googleapis.com/v4/threatMatches:find?key=${API.GSB_KEY}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        client:{clientId:'linkreaper',clientVersion:'4.0'},
        threatInfo:{
          threatTypes:['MALWARE','SOCIAL_ENGINEERING','UNWANTED_SOFTWARE','POTENTIALLY_HARMFUL_APPLICATION'],
          platformTypes:['ANY_PLATFORM'],
          threatEntryTypes:['URL'],
          threatEntries:[{url}]
        }
      })
    });
    if(!res.ok)return{status:'err',detail:'API Error '+res.status,score:0};
    const data=await res.json();
    if(data.matches&&data.matches.length>0){
      const types=data.matches.map(m=>m.threatType).join(', ');
      return{status:'bad',detail:types,score:-45,threats:data.matches.map(m=>m.threatType)};
    }
    return{status:'ok',detail:'No threats found',score:0};
  }catch(e){
    return{status:'err',detail:'Network error',score:0};
  }
}

// 2. URLScan.io — submit then poll
async function checkURLScan(url){
  try{
    // Submit
    const sub=await fetch('https://urlscan.io/api/v1/scan/',{
      method:'POST',
      headers:{'Content-Type':'application/json','API-Key':API.URLSCAN},
      body:JSON.stringify({url,visibility:'unlisted'})
    });
    if(!sub.ok){
      if(sub.status===400)return{status:'err',detail:'Invalid URL for URLScan',score:0};
      if(sub.status===429)return{status:'skip',detail:'Rate limit reached',score:0};
      return{status:'err',detail:'Submit error '+sub.status,score:0};
    }
    const subData=await sub.json();
    const uuid=subData.uuid;
    if(!uuid)return{status:'err',detail:'No scan ID',score:0};

    // Poll result (max 20s)
    for(let i=0;i<8;i++){
      await sleep(2500);
      try{
        const poll=await fetch(`https://urlscan.io/api/v1/result/${uuid}/`);
        if(poll.status===404){continue;}
        if(!poll.ok)continue;
        const r=await poll.json();
        const verdict=r.verdicts?.overall;
        const malicious=verdict?.malicious||false;
        const score_v=verdict?.score||0;
        const cats=verdict?.categories||[];

        if(malicious){
          return{status:'bad',detail:`Malicious: ${cats.join(', ')||'flagged'}`,score:-40,screenshot:r.task?.screenshotURL};
        }
        if(score_v>50){
          return{status:'warn',detail:`Suspicious score: ${score_v}`,score:-15,screenshot:r.task?.screenshotURL};
        }
        return{status:'ok',detail:`Clean (score: ${score_v})`,score:0,screenshot:r.task?.screenshotURL};
      }catch(pe){continue;}
    }
    return{status:'skip',detail:'Scan timeout — check later',score:0};
  }catch(e){
    return{status:'err',detail:'Network error',score:0};
  }
}

// 3. AbuseIPDB — resolve domain → IP → check
async function checkAbuseIPDB(domain){
  try{
    // Use DNS over HTTPS to resolve domain to IP
    const dnsRes=await fetch(`https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=A`);
    if(!dnsRes.ok)return{status:'err',detail:'DNS resolution failed',score:0};
    const dnsData=await dnsRes.json();
    const answers=dnsData.Answer||[];
    const ip=answers.find(a=>a.type===1)?.data;
    if(!ip)return{status:'skip',detail:'Could not resolve IP',score:0};

    const res=await fetch(`https://api.abuseipdb.com/api/v2/check?ipAddress=${ip}&maxAgeInDays=90&verbose`,{
      headers:{'Key':API.ABUSEIPDB,'Accept':'application/json'}
    });
    if(!res.ok)return{status:'err',detail:'AbuseIPDB error '+res.status,score:0};
    const d=await res.json();
    const pct=d.data?.abuseConfidenceScore||0;
    const reports=d.data?.totalReports||0;

    if(pct>=50){return{status:'bad',detail:`IP ${ip}: ${pct}% abuse (${reports} reports)`,score:-35};}
    if(pct>=15||reports>0){return{status:'warn',detail:`IP ${ip}: ${pct}% abuse score`,score:-12};}
    return{status:'ok',detail:`IP ${ip}: Clean (${pct}% abuse)`,score:0};
  }catch(e){
    return{status:'err',detail:'Network error',score:0};
  }
}

// 4. PhishStats
async function checkPhishStats(url){
  try{
    const domain=new URL(/^https?:\/\//i.test(url)?url:'http://'+url).hostname;
    const res=await fetch(`https://api.phishstats.info/api/phishing?_where=(url,like,~${encodeURIComponent(domain)}~)&_size=5`,{
      headers:{'Accept':'application/json'}
    });
    if(!res.ok){
      if(res.status===404)return{status:'ok',detail:'Not in phishing database',score:0};
      return{status:'skip',detail:'PhishStats unavailable',score:0};
    }
    const data=await res.json();
    if(Array.isArray(data)&&data.length>0){
      return{status:'bad',detail:`Found in phishing DB (${data.length} records)`,score:-30};
    }
    return{status:'ok',detail:'Not in phishing database',score:0};
  }catch(e){
    // CORS or network error — try alternative
    return{status:'skip',detail:'CORS/Network — skipped',score:0};
  }
}

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
async function startScan(){
  if(isScanning)return;
  const L=T[lang];
  const raw=document.getElementById('urlInput').value.trim();
  if(!raw){
    const inp=document.getElementById('urlInput');
    inp.style.borderColor='var(--neon)';inp.style.boxShadow='var(--shadow-red)';
    typeText(document.getElementById('monTxt'),L.empty);
    setTimeout(()=>{inp.style.borderColor='';inp.style.boxShadow='';},900);
    return;
  }

  isScanning=true;
  document.getElementById('scanBtn').disabled=true;
  document.getElementById('resCard').style.display='none';
  document.getElementById('tipsCard').style.display='none';

  // Show engine
  const ec=document.getElementById('engineCard');
  ec.style.display='block';
  [0,1,2,3,4].forEach(i=>{setLayer(i,'waiting');document.getElementById('es'+i).textContent='';});
  setProgress(0);

  // Parse domain
  let parsedDomain='unknown';
  try{
    let u=raw;if(!/^https?:\/\//i.test(u))u='http://'+u;
    parsedDomain=new URL(u).hostname;
  }catch(e){}

  document.getElementById('monAv').textContent='🔍';
  typeText(document.getElementById('monTxt'),L.running,18);

  const apiResults=[];

  /* ── Layer 0: Heuristics ── */
  setLayer(0,'running',L.running);
  const hResult=runHeuristics(raw);
  await sleep(400);
  const hState=hResult.score>=72?'ok':hResult.score>=42?'warn':'bad';
  setLayer(0,hState,`Score: ${hResult.score}/100`);
  setProgress(20);

  /* ── Layer 1: Google Safe Browsing ── */
  setLayer(1,'running',L.running);
  typeText(document.getElementById('monTxt'),L.engStatus[1]+'...',16);
  const gsbRes=await checkGSB(raw);
  setLayer(1,gsbRes.status,gsbRes.detail);
  apiResults.push({name:'Google Safe Browsing',icon:'🛡️',res:gsbRes});
  setProgress(40);

  /* ── Layer 2: URLScan ── */
  setLayer(2,'running',L.running+'  (10-20s)');
  typeText(document.getElementById('monTxt'),L.engStatus[2]+'...',16);
  const urlRes=await checkURLScan(raw);
  setLayer(2,urlRes.status,urlRes.detail);
  apiResults.push({name:'URLScan.io',icon:'🔬',res:urlRes});
  setProgress(60);

  /* ── Layer 3: AbuseIPDB ── */
  setLayer(3,'running',L.running);
  typeText(document.getElementById('monTxt'),L.engStatus[3]+'...',16);
  const ipRes=await checkAbuseIPDB(parsedDomain);
  setLayer(3,ipRes.status,ipRes.detail);
  apiResults.push({name:'AbuseIPDB',icon:'🌐',res:ipRes});
  setProgress(80);

  /* ── Layer 4: PhishStats ── */
  setLayer(4,'running',L.running);
  typeText(document.getElementById('monTxt'),L.engStatus[4]+'...',16);
  const phishRes=await checkPhishStats(raw);
  setLayer(4,phishRes.status,phishRes.detail);
  apiResults.push({name:'PhishStats',icon:'🎣',res:phishRes});
  setProgress(100);

  await sleep(300);
  ec.style.display='none';

  /* ── Final Score ── */
  let finalScore=hResult.score;
  apiResults.forEach(a=>{if(typeof a.res.score==='number')finalScore+=a.res.score;});
  finalScore=Math.max(0,Math.min(100,finalScore));
  const level=finalScore>=70?'safe':finalScore>=40?'warning':'danger';

  const result={score:finalScore,level,apiResults,hChecks:hResult.checks,domain:parsedDomain,rawUrl:raw};
  lastResult=result;

  renderResult(finalScore,level,apiResults,hResult.checks,parsedDomain,raw,true);
  addHistory(raw,level,finalScore);

  isScanning=false;
  document.getElementById('scanBtn').disabled=false;
}

═══════════════════════════════════════════════════════ */
function renderResult(score,level,apiResults,hChecks,domain,rawUrl,animate){
  const L=T[lang];
  const card=document.getElementById('resCard');
  card.className=level;
  card.style.display='block';

  // Ring
  if(animate){animateRing(score,level);}
  else{
    const colors={safe:'#00FF88',warning:'#FFB300',danger:'#FF2244'};
    const fill=document.getElementById('ringFill');
    fill.style.stroke=colors[level];
    fill.style.strokeDashoffset=213.6-(213.6*score/100);
    document.getElementById('ringNum').textContent=score;
    document.getElementById('ringNum').style.color=colors[level];
  }

  document.getElementById('resVerdict').textContent=L.verdict[level];
  document.getElementById('resDomain').textContent=domain||rawUrl;

  // Threat tags
  const tags=document.getElementById('threatTags');
  tags.innerHTML='';
  let tagList=[];
  apiResults.forEach(a=>{
    if(a.res.status==='bad'){
      if(a.name.includes('Google'))tagList.push({cls:'malware',txt:'MALWARE/PHISHING'});
      if(a.name.includes('URLScan'))tagList.push({cls:'malware',txt:'MALICIOUS SITE'});
      if(a.name.includes('Abuse'))tagList.push({cls:'abuse',txt:'IP ABUSE'});
      if(a.name.includes('Phish'))tagList.push({cls:'phishing',txt:'PHISHING DB'});
    }
    if(a.res.status==='warn')tagList.push({cls:'suspicious',txt:'SUSPICIOUS'});
  });
  if(!tagList.length){tagList=[{cls:'clean',txt:level==='safe'?'CLEAN':'UNKNOWN'}];}
  tags.innerHTML=[...new Map(tagList.map(t=>[t.txt,t])).values()].map(t=>`<div class="ttag ${t.cls}">${t.txt}</div>`).join('');

  // AI verdict
  const vArr=L.ai[level];
  const v=vArr[Math.floor(Math.random()*vArr.length)](domain||rawUrl,score);
  document.getElementById('aiVerdict').textContent=v;

  // API source cards
  document.getElementById('srcGrid').innerHTML=apiResults.map(a=>{
    const pillMap={ok:'pill-safe',warn:'pill-warn',bad:'pill-bad',skip:'pill-skip',err:'pill-err'};
    const pillCls=pillMap[a.res.status]||'pill-skip';
    const pillTxt={ok:'✅ CLEAN',warn:'⚠️ WARN',bad:'🚨 THREAT',skip:'— SKIPPED',err:'⚠️ ERROR'}[a.res.status]||'—';
    return `<div class="src-card">
      <div class="src-icon">${a.icon}</div>
      <div class="src-info">
        <div class="src-name">${a.name}</div>
        <div class="src-detail">${escH(a.res.detail||'—')}</div>
      </div>
      <div class="src-pill ${pillCls}">${pillTxt}</div>
    </div>`;
  }).join('');

  // Heuristic checks
  document.getElementById('chkGrid').innerHTML=hChecks.map(c=>`
    <div class="ci ${c.cls}">
      <span>${c.cls==='chk-ok'?'✅':c.cls==='chk-warn'?'⚠️':'❌'}</span>
      <span>${escH(c.txt)}</span>
    </div>`).join('');

  // Tips
  if(level==='danger'){
    const tc=document.getElementById('tipsCard');
    const pts=L.tips.split(':');
    tc.innerHTML=`<strong>${pts[0]}:</strong>${pts.slice(1).join(':')}`;
    tc.style.display='block';
  }

  // Monster
  document.getElementById('monAv').textContent=level==='safe'?'😌':level==='warning'?'😒':'😱';
  typeText(document.getElementById('monTxt'),L.monReact[level],22);

  if(animate)card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ═══════════════════════════════════════════════════════
   HISTORY
═══════════════════════════════════════════════════════ */
function addHistory(url,level,score){
  history.unshift({url,level,score});
  if(history.length>6)history=history.slice(0,6);
  renderHistory();
}
function renderHistory(){
  const sec=document.getElementById('histSec');
  const list=document.getElementById('histList');
  if(!history.length){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=history.map((h,i)=>`
    <div class="hi" onclick="reScan(${i})">
      <div class="hd ${h.level}"></div>
      <span class="hu">${escH(h.url)}</span>
      <span class="hs">${h.score}/100</span>
    </div>`).join('');
}
function reScan(i){document.getElementById('urlInput').value=history[i].url;startScan();}

/* ═══════════════════════════════════════════════════════
   SHARE
═══════════════════════════════════════════════════════ */
function doShare(){
  if(!lastResult)return;
  const L=T[lang];
  const txt=L.shareMsg(lastResult.domain,lastResult.score,lastResult.level);
  if(navigator.share){navigator.share({title:'LinkReaper',text:txt}).catch(()=>{});}
  else{
    navigator.clipboard.writeText(txt).then(()=>{
      const btn=document.getElementById('shareBtn');
      const orig=btn.innerHTML;
      btn.innerHTML='✅ <span>Copied!</span>';
      setTimeout(()=>{btn.innerHTML=orig;},2000);
    }).catch(()=>{});
  }
}

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ═══════════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════════ */
document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')startScan();});

/* INIT */
setLang('ar');
</script>
