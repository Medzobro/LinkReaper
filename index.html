<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="LinkReaper — Real URL Threat Intelligence | كاشف الروابط الأمني الحقيقي">
  <meta name="theme-color" content="#060608">

  <!-- Open Graph (social sharing) -->
  <meta property="og:title"       content="LinkReaper — URL Safety">
  <meta property="og:description" content="Real-time URL threat analysis using 4 security APIs">
  <meta property="og:image"       content="assets/og-image.png">
  <meta property="og:url"         content="https://linkreaper.app">
  <meta name="twitter:card"       content="summary_large_image">

  <title>LinkReaper — Threat Intelligence v4.1</title>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Creepster&family=Tajawal:wght@300;400;700;900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── BACKGROUND LAYERS ── -->
<div class="bg-base"  aria-hidden="true"></div>
<div class="bg-lines" aria-hidden="true"></div>
<div class="bg-grid"  aria-hidden="true"></div>
<div id="pts"         aria-hidden="true"></div>

<!-- ── LANGUAGE BAR ── -->
<nav id="langBar" aria-label="Language selector">
  <button class="lbtn on" onclick="setLang('ar')" lang="ar" aria-label="Arabic">🇸🇦 العربية</button>
  <div class="lsep" aria-hidden="true"></div>
  <button class="lbtn" onclick="setLang('en')" lang="en" aria-label="English">🇺🇸 English</button>
  <div class="lsep" aria-hidden="true"></div>
  <button class="lbtn" onclick="setLang('fr')" lang="fr" aria-label="French">🇫🇷 Français</button>
  <div class="lsep" aria-hidden="true"></div>
  <button class="lbtn" onclick="setLang('es')" lang="es" aria-label="Spanish">🇪🇸 Español</button>
  <div class="lsep" aria-hidden="true"></div>
  <button class="lbtn" onclick="setLang('tr')" lang="tr" aria-label="Turkish">🇹🇷 Türkçe</button>
  <div class="lsep" aria-hidden="true"></div>
  <button class="lbtn" onclick="setLang('de')" lang="de" aria-label="German">🇩🇪 Deutsch</button>
</nav>

<main class="app">

  <!-- ── HEADER ── -->
  <header class="hdr">
    <div class="logo-ring" aria-hidden="true">
      <span class="skull">💀</span>
    </div>
    <h1 class="app-title">LinkReaper</h1>
    <div class="vtag" aria-hidden="true">
      <span class="vbadge">v4.1</span>
      <div class="live-dot"></div>
      <span class="live-txt">LIVE INTEL</span>
    </div>
    <p id="tagline" role="doc-subtitle"></p>
  </header>

  <!-- ── MONSTER / AI ASSISTANT ── -->
  <section class="mon-box" aria-live="polite" aria-label="AI Assistant">
    <div class="mon-av" id="monAv" aria-hidden="true">💀</div>
    <div style="flex:1; min-width:0;">
      <div class="mon-name" aria-hidden="true">// REAPER.EXE v4.1 — THREAT INTELLIGENCE ENGINE</div>
      <div id="monTxt"><span class="tc"></span></div>
    </div>
  </section>

  <!-- ── URL INPUT ── -->
  <section class="inp-card">
    <label id="inputLabel" for="urlInput"></label>
    <div class="inp-row">
      <input
        type="url"
        id="urlInput"
        placeholder="https://example.com"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-labelledby="inputLabel"
      >
      <button id="scanBtn" onclick="startScan()" aria-label="Scan URL">
        🔍 <span id="scanBtnTxt"></span>
      </button>
    </div>
  </section>

  <!-- ── ENGINE STATUS ── -->
  <section id="engineCard" aria-live="polite" aria-label="Scan engine status">
    <div class="eng-title" id="engTitle"></div>
    <div class="eng-layers">

      <div class="eng-layer" id="el0">
        <div class="eng-icon" aria-hidden="true">🧬</div>
        <div class="eng-info">
          <div class="eng-name">HEURISTIC ENGINE</div>
          <div class="eng-status" id="es0"></div>
        </div>
        <div class="eng-badge waiting" id="eb0">WAITING</div>
      </div>

      <div class="eng-layer" id="el1">
        <div class="eng-icon" aria-hidden="true">🛡️</div>
        <div class="eng-info">
          <div class="eng-name">GOOGLE SAFE BROWSING</div>
          <div class="eng-status" id="es1"></div>
        </div>
        <div class="eng-badge waiting" id="eb1">WAITING</div>
      </div>

      <div class="eng-layer" id="el2">
        <div class="eng-icon" aria-hidden="true">🔬</div>
        <div class="eng-info">
          <div class="eng-name">URLSCAN.IO ANALYSIS</div>
          <div class="eng-status" id="es2"></div>
        </div>
        <div class="eng-badge waiting" id="eb2">WAITING</div>
      </div>

      <div class="eng-layer" id="el3">
        <div class="eng-icon" aria-hidden="true">🌐</div>
        <div class="eng-info">
          <div class="eng-name">ABUSEIPDB</div>
          <div class="eng-status" id="es3"></div>
        </div>
        <div class="eng-badge waiting" id="eb3">WAITING</div>
      </div>

      <div class="eng-layer" id="el4">
        <div class="eng-icon" aria-hidden="true">🎣</div>
        <div class="eng-info">
          <div class="eng-name">PHISHSTATS DATABASE</div>
          <div class="eng-status" id="es4"></div>
        </div>
        <div class="eng-badge waiting" id="eb4">WAITING</div>
      </div>

    </div>
    <!-- Progress bar -->
    <div class="prog-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div id="progFill"></div>
    </div>
  </section>

  <!-- ── RESULT CARD ── -->
  <section id="resCard" aria-live="polite" aria-label="Scan result">

    <!-- Score ring + verdict -->
    <div class="res-top">
      <div class="score-ring-wrap" aria-hidden="true">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle class="ring-bg"   cx="40" cy="40" r="34"/>
          <circle class="ring-fill" id="ringFill" cx="40" cy="40" r="34"
            stroke-dasharray="213.628"
            stroke-dashoffset="213.628"
          />
        </svg>
        <div class="ring-center">
          <div class="ring-num"   id="ringNum">0</div>
          <div class="ring-label">/100</div>
        </div>
      </div>
      <div class="res-meta">
        <div id="resVerdict" role="heading" aria-level="2"></div>
        <div id="resDomain"></div>
        <div class="threat-tags" id="threatTags" aria-label="Threat tags"></div>
      </div>
    </div>

    <!-- AI verdict -->
    <div id="aiVerdict" aria-live="polite"></div>

    <!-- API Source results -->
    <div class="src-title" id="srcTitle"></div>
    <div class="src-grid"  id="srcGrid"  role="list"></div>

    <!-- Heuristic checks -->
    <div class="src-title" id="chkTitle"></div>
    <div class="chk-grid"  id="chkGrid"  role="list"></div>

    <!-- Share -->
    <div class="share-row">
      <button class="share-btn" id="shareBtn" onclick="doShare()">
        🔗 <span id="shareTxt"></span>
      </button>
    </div>

  </section>

  <!-- ── SAFETY TIPS ── -->
  <aside id="tipsCard" role="alert" aria-label="Safety tips"></aside>

  <!-- ── DISCLAIMER ── -->
  <p class="disclaimer" id="disclaimerEl"></p>

  <!-- ── AI UPDATE BANNER ── -->
  <aside class="ai-banner">
    <div class="ai-icon" aria-hidden="true">🤖</div>
    <div>
      <div class="ai-ttl" id="bannerTitle"></div>
      <div class="ai-dsc" id="bannerDesc"></div>
    </div>
  </aside>

  <!-- ── SOCIAL LINKS ── -->
  <div class="soc-row">
    <a
      class="soc-btn soc-x"
      href="https://x.com/LinkReaper"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Follow LinkReaper on X"
    >
      <span aria-hidden="true">𝕏</span>
      <span id="xTxt"></span>
    </a>
    <a
      class="soc-btn soc-tg"
      href="https://t.me/LinkReaper"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="LinkReaper Telegram channel"
    >
      <span aria-hidden="true">✈️</span>
      <span id="tgTxt"></span>
    </a>
  </div>

  <!-- ── SCAN HISTORY ── -->
  <section id="histSec" aria-label="Scan history">
    <div class="sec-lbl" id="histLbl"></div>
    <div id="histList" role="list"></div>
  </section>

  <!-- ── FOOTER ── -->
  <footer id="footerEl"></footer>

</main>

<!-- ── SCRIPTS (order matters) ── -->
<script src="js/translations.js"></script>
<script src="js/engine.js"></script>
<script src="js/app.js"></script>

</body>
</html>
